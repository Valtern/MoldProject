# =====================================================================
#  MoldGuard Frontend CI Pipeline
# ---------------------------------------------------------------------
#  Arsitektur:
#    - LINT   → jalan di SEMUA branch setiap ada push
#    - BUILD  → jalan hanya di branch `experimental` dan `main`
#    - AUTO-PR→ otomatis buat PR ke main kalau ada push ke `experimental`
#
#  Workflow ini TIDAK men-deploy ke Firebase.
#  Deploy ditangani oleh deploy.yml (hanya di main).
# =====================================================================

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # JOB 1: LINT — jalan di semua branch
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # -------------------------------------------------------------------
  # JOB 2: BUILD — hanya jalan di branch `experimental` dan `main`
  # -------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    if: |
      github.ref == 'refs/heads/experimental' ||
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found."
            exit 1
          fi
          echo "Build verified."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # -------------------------------------------------------------------
  # JOB 3: AUTO-PR — hanya jalan kalau push ke `experimental`
  #         Otomatis buat PR dari experimental ke main (skip jika sudah ada)
  # -------------------------------------------------------------------
  auto-pr:
    name: Auto PR to main
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/experimental'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Pull Request to main (skip if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base main \
            --head experimental \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING sudah ada dari experimental → main. Skip."
          else
            gh pr create \
              --base main \
              --head experimental \
              --title "feat: merge experimental into main" \
              --body "$(cat <<'EOF'
## Auto-generated PR

Pull request ini dibuat otomatis oleh CI setelah ada push ke branch \`experimental\`.

### Checklist sebelum merge
- [ ] Semua CI jobs hijau (Lint + Build)
- [ ] Review code sudah dilakukan
- [ ] Tidak ada konflik dengan \`main\`
EOF
)"
            echo "PR berhasil dibuat dari experimental → main."
          fi
