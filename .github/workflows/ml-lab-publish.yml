name: Build and Publish ML Lab Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'deep-learning/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-ml:
    name: Build & push ML Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: ./deep-learning
          file: ./deep-learning/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/moldproject-ml-lab:latest
            ghcr.io/${{ github.repository_owner }}/moldproject-ml-lab:${{ github.sha }}
