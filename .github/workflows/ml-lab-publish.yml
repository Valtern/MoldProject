name: Build and Publish ML Lab Image

on:
  workflow_dispatch:
  push:
    branches: [main, experimental]
    paths:
      - 'deep-learning/**'
      - '.github/workflows/ml-lab-publish.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-ml:
    name: Build & push ML Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image repository
        id: image
        shell: bash
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/moldproject-ml-lab" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repo }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: ./deep-learning
          file: ./deep-learning/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image.outputs.repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.repo }}:buildcache,mode=max
