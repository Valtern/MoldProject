# =====================================================================
#  MoldGuard CD Pipeline — Google Cloud Build
# ---------------------------------------------------------------------
#  Trigger: push to branch `main`
#  Purpose: Build production bundle and deploy to Firebase Hosting
#
#  DESIGN PRINCIPLES:
#    - CI (lint, type-check, build validation) is handled by GitHub
#      Actions on ALL branches via .github/workflows/ci.yml.
#    - This pipeline focuses on CD ONLY: build + deploy on `main`.
#    - No lint/test duplication to keep builds fast and focused.
#    - No Compute Engine / VM / Big Data commands — completely
#      isolated to Firebase Hosting deployment.
# =====================================================================

steps:
  # -----------------------------------------------------------------
  # Step 1 — Install Dependencies (with local npm cache)
  # -----------------------------------------------------------------
  - name: 'node:20-slim'
    id: 'install-deps'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "============================================"
        echo "  STEP 1/3: Installing dependencies"
        echo "  Node version: $(node --version)"
        echo "  NPM version:  $(npm --version)"
        echo "============================================"

        # Use workspace-level npm cache for faster installs
        npm ci --cache /workspace/.npm --prefer-offline

        echo "Dependencies installed successfully."
    volumes:
      - name: 'npm_cache'
        path: '/workspace/.npm'

  # -----------------------------------------------------------------
  # Step 2 — Build Production Bundle
  # -----------------------------------------------------------------
  # NOTE: `npm run build` runs `tsc -b && vite build`.
  # TypeScript type-checking happens here as part of the build.
  # -----------------------------------------------------------------
  - name: 'node:20-slim'
    id: 'build-prod'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "============================================"
        echo "  STEP 2/3: Building production bundle"
        echo "============================================"

        npm run build

        echo "============================================"
        echo "  Build complete. dist/ contents:"
        echo "============================================"
        ls -la dist/

        # Verify index.html exists (critical for SPA routing)
        if [[ ! -f "dist/index.html" ]]; then
          echo "ERROR: dist/index.html not found. Build may have failed."
          exit 1
        fi

  # -----------------------------------------------------------------
  # Step 3 — Deploy to Firebase Hosting
  # -----------------------------------------------------------------
  # AUTHENTICATION:
  #   Uses a Firebase CI token stored in Google Secret Manager.
  #   This is the most reliable and production-safe method for
  #   Cloud Build because `firebase deploy` is designed around
  #   user (token) authentication rather than service-account ADC.
  #
  # PREREQUISITE (one-time setup — see CI-CD-GUIDE.md):
  #   1. Locally run:  firebase login:ci
  #   2. Store token: gcloud secrets create firebase-ci-token \
  #                     --data-file=- <<< "YOUR_TOKEN"
  #   3. Grant Cloud Build SA: Secret Manager Secret Accessor
  # -----------------------------------------------------------------
  - name: 'node:20-slim'
    id: 'deploy-firebase'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "============================================"
        echo "  STEP 3/3: Deploying to Firebase Hosting"
        echo "  Project: moldymoldbase"
        echo "  Target:  Firebase Hosting (live channel)"
        echo "============================================"

        echo "Installing Firebase CLI..."
        npm install -g firebase-tools@latest

        echo "Starting deployment..."
        firebase deploy \
          --project moldymoldbase \
          --only hosting \
          --token "$$FIREBASE_TOKEN" \
          --non-interactive \
          --force

        echo "============================================"
        echo "  DEPLOYMENT SUCCESSFUL"
        echo "============================================"
    secretEnv: ['FIREBASE_TOKEN']

# ---------------------------------------------------------------------
# Build Configuration
# ---------------------------------------------------------------------
options:
  # Use Google Cloud Logging for centralized monitoring & debugging
  logging: CLOUD_LOGGING_ONLY

  # Fail immediately on first error — no point continuing a broken pipeline
  substitutionOption: ALLOW_LOOSE

  # Enable dynamic variable substitutions (e.g., $PROJECT_ID)
  dynamicSubstitutions: true

  # Default machine type (E2_MEDIUM equivalent) auto-selected by Cloud Build.
  # Override only if you need larger workers (e.g. N1_HIGHCPU_8).

# ---------------------------------------------------------------------
# Secret Manager Integration
# ---------------------------------------------------------------------
# The Firebase CI token is fetched from Secret Manager at build time.
# The Cloud Build service account MUST have IAM role:
#   roles/secretmanager.secretAccessor
# on the secret `projects/$PROJECT_ID/secrets/firebase-ci-token`.
# ---------------------------------------------------------------------
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN
