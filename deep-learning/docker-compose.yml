version: '3.8'

services:
  ml-lab:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: moldproject-ml-lab
    ports:
      - "8888:8888"  # Jupyter Lab
      - "8000:8000"  # FastAPI
    volumes:
      - ./datasets:/app/datasets
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./notebooks:/app/notebooks
      - ./training:/app/training
      - ./inference:/app/inference
      - ./api:/app/api
    environment:
      - PYTHONUNBUFFERED=1
      - JUPYTER_ENABLE_LAB=yes
    # Uncomment for GPU support (requires nvidia-docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: >
      sh -c "jupyter lab --ip=0.0.0.0 --allow-root --no-browser
      && python api/main.py"

networks:
  default:
    name: moldproject-network
